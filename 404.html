<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly Chemical Manufacturing - Page Not Found</title>

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,-50..200" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">

    <style>
        :root {
            --pcolor: #0D80CE;
            --scolor: #132340;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap');

        html,
        body {
            overflow-x: hidden;
            width: 100%;
        }

        body {
            font-family: "Inter", sans-serif;
            color: var(--scolor);
        }

        .err-section {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background:
                linear-gradient(125deg, rgba(10, 20, 40, 0.88), rgba(13, 128, 206, 0.55)),
                url("https://images.unsplash.com/photo-1670689334015-299d6559b3c3?auto=format&fit=crop&w=1600&q=80") center/cover no-repeat;
        }

        .err-inner {
            text-align: center;
            max-width: 640px;
        }

        .err-logo {
            margin-bottom: 40px;
        }

        .err-logo img {
            width: 20px;
        }

        .err-code {
            font-family: "Orbitron", "Inter", sans-serif;
            font-weight: 700;
            font-size: clamp(90px, 20vw, 200px);
            line-height: 1;

            /* Transparent inside */
            color: transparent;
            -webkit-text-fill-color: transparent;

            /* Industrial light-blue outline */
            -webkit-text-stroke: 2px rgba(190, 230, 255, 0.95);

            letter-spacing: 10px;
            margin-bottom: 10px;

            /* Blue glow */
            filter:
                drop-shadow(0 0 5px rgba(0, 174, 255, 0.5)) drop-shadow(0 0 15px rgba(0, 174, 255, 0.35));

            animation: industrial404 2.5s ease-in-out infinite alternate;
        }


        @keyframes industrial404 {

            0% {
                transform: translateY(0) scale(1);

                -webkit-text-stroke-color: rgba(190, 230, 255, 0.7);

                filter:
                    drop-shadow(0 0 4px rgba(0, 174, 255, 0.3)) drop-shadow(0 0 10px rgba(0, 174, 255, 0.2));
            }

            100% {
                transform: translateY(-7px) scale(1.02);

                -webkit-text-stroke-color: rgba(255, 255, 255, 1);

                filter:
                    drop-shadow(0 0 8px rgba(0, 174, 255, 0.9)) drop-shadow(0 0 20px rgba(0, 174, 255, 0.6)) drop-shadow(0 0 35px rgba(0, 174, 255, 0.3));
            }
        }

        .err-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 8px 18px;
            border-radius: 30px;
            font-family: "Sora", sans-serif;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
            margin-bottom: 22px;
        }

        .err-eyebrow span {
            font-size: 18px;
            color: var(--pcolor);
        }

        .err-inner h1 {
            font-family: "Sora", sans-serif;
            font-weight: 500;
            font-size: clamp(24px, 3vw, 34px);
            color: white;
            margin-bottom: 14px;
            line-height: 1.3;
        }

        .err-inner p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 15px;
            line-height: 1.7;
            max-width: 480px;
            margin: 0 auto 36px auto;
        }

        .err-btns {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 46px;
        }

        .err-btn-solid,
        .err-btn-outline {
            padding: 15px 32px;
            border-radius: 7px;
            font-size: 15px;
            font-family: "Inter", sans-serif;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: .5s ease;
        }

        .err-btn-solid {
            background: var(--pcolor);
            color: white;
            border: 1px solid var(--pcolor);
        }

        .err-btn-solid:hover {
            background: white;
            color: var(--scolor);
            border-color: white;
        }

        .err-btn-outline {
            background: transparent;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .err-btn-outline:hover {
            background: white;
            color: var(--scolor);
        }

        .err-links {
            display: flex;
            justify-content: center;
            gap: 26px;
            flex-wrap: wrap;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.18);
        }

        .err-links a {
            display: flex;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            font-size: 13.5px;
            transition: .4s ease;
        }

        .err-links a span {
            font-size: 18px;
            color: var(--pcolor);
        }

        .err-links a:hover {
            color: var(--pcolor);
        }

        @media (max-width:560px) {
            .err-logo img {
                width: 130px;
            }

            .err-btns {
                flex-direction: column;
                align-items: center;
            }

            .err-links {
                gap: 16px 22px;
            }
        }
    </style>
</head>

<body>

    <section class="err-section">
        <div class="err-inner">

            <div class="err-logo">
                <a href="index.html"><img src="./src/logo.webp" alt="Company Logo"></a>
            </div>

            <div class="err-code">404</div>

            <div class="err-eyebrow"><span class="material-symbols-outlined">science</span>Page Not Found</div>

            <h1>This Page Seems to Have Evaporated</h1>
            <p>The page you're looking for may have been moved, renamed, or never existed. Let's get you back to solid
                ground.</p>

            <div class="err-btns">
                <a href="index.html" class="err-btn-solid"><span class="material-symbols-outlined">home</span>Back to
                    Home</a>
                <a href="contact.html" class="err-btn-outline"><span
                        class="material-symbols-outlined">forum</span>Contact Us</a>
            </div>

            <div class="err-links">
                <a href="about.html"><span class="material-symbols-outlined">domain</span>About Us</a>
                <a href="pages.html"><span class="material-symbols-outlined">grid_view</span>All Pages</a>
                <a href="blog.html"><span class="material-symbols-outlined">article</span>Blog</a>
                <a href="contact.html"><span class="material-symbols-outlined">call</span>Support</a>
            </div>

        </div>
    </section>

</body>

</html>
